spring:
  application:
    name: interdimensional-bazaar

  datasource:
    # TODO: Disable `allowPublicKeyRetrieval` in production
    url: jdbc:mysql://localhost:3306/bazaar_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    # TODO: Change username and password to correct values
    username: bazaar_user
    password: password123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      # Keep UUID columns as CHAR/VARCHAR(36) to match existing MySQL schema and FKs; default is BINARY(16)
      hibernate.type.preferred_uuid_jdbc_type: CHAR

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
